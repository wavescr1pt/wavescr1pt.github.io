<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WaveScript 1.0</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' fill='white'/%3E%3Crect width='128' height='24' fill='%230081FF'/%3E%3Ccircle cx='16' cy='12' r='6' fill='white'/%3E%3Ccircle cx='36' cy='12' r='6' fill='white'/%3E%3Crect y='24' width='128' height='56' fill='%233D3D3D'/%3E%3Cpath d='M12.8 71.68V128H28.416L34.176 100.224L39.808 128H55.424V71.68H43.008V111.872L36.864 82.304H31.36L25.216 111.872V71.68H12.8ZM61.824 116.352L72.448 111.36C73.984 116.096 77.568 118.912 82.816 118.912C88.064 118.912 91.392 116.736 91.392 113.152C91.392 110.08 89.6 108.032 83.328 106.368L77.056 104.704C68.352 102.336 63.872 98.496 63.872 90.944C63.872 82.24 71.296 76.224 82.176 76.224C92.416 76.224 99.456 81.6 100.992 90.56L90.752 94.784C89.472 90.688 86.656 86.912 81.536 86.912C77.056 86.912 74.56 89.088 74.56 91.904C74.56 94.592 76.224 96.128 82.56 97.792L88.832 99.456C98.048 101.888 102.272 105.856 102.272 112.512C102.272 122.24 94.336 129.28 82.432 129.28C71.04 129.28 63.232 123.648 61.824 116.352Z' fill='black'/%3E%3C/svg%3E">
    <style>
        :root { --bg: #0d0d0d; --panel: #141414; --accent: #0081ff; --border: #222; --text-main: #e0e0e0; --text-sub: #666; --editor-text: #b3d9ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .nav-bar { height: 48px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 100; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .ws-logo { height: 24px; width: auto; border-radius: 3px; }
        .brand-name { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .btn-export { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; }
        
        main { flex: 1; display: flex; overflow: hidden; }
        .pane { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .pane-preview { flex: 1.1; border-left: 1px solid var(--border); }
        .pane-header { font-size: 10px; font-weight: 800; color: var(--text-sub); padding: 10px 20px; text-transform: uppercase; background: var(--panel); border-bottom: 1px solid var(--border); height: 14px; }
        
        textarea { flex: 1; background: transparent; color: var(--editor-text); border: none; padding: 24px; font-family: 'Fira Code', monospace; font-size: 13px; line-height: 1.7; outline: none; resize: none; }
        
        .canvas-container { flex: 1; overflow-y: auto; background: #fff; }
        #canvas { width: 100%; min-height: 100%; color: #000; display: flex; flex-direction: column; }

        .ws-h { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); min-height: 64px; box-sizing: border-box; width: 100%; }
        .ws-h-right { display: flex; gap: 12px; align-items: center; }
        
        .hb { text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; display: inline-block; padding: 8px 18px; border-radius: 6px; background: var(--accent); color: #fff; border: none; }
        
        .ws-h.as-link .hb { background: transparent !important; color: inherit !important; padding: 4px 8px !important; border: none !important; }
        .ws-h.as-link .hb:hover { color: var(--accent) !important; text-decoration: underline; }

        section { box-sizing: border-box; display: flex; flex-direction: column; flex-shrink: 0; white-space: pre-line; position: relative; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="brand">
        <svg class="ws-logo" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="128" height="128" fill="white"/><rect width="128" height="24" fill="#0081FF"/><circle cx="16" cy="12" r="6" fill="white"/><circle cx="36" cy="12" r="6" fill="white"/><rect y="24" width="128" height="56" fill="#3D3D3D"/><path d="M12.8 71.68V128H28.416L34.176 100.224L39.808 128H55.424V71.68H43.008V111.872L36.864 82.304H31.36L25.216 111.872V71.68H12.8ZM61.824 116.352L72.448 111.36C73.984 116.096 77.568 118.912 82.816 118.912C88.064 118.912 91.392 116.736 91.392 113.152C91.392 110.08 89.6 108.032 83.328 106.368L77.056 104.704C68.352 102.336 63.872 98.496 63.872 90.944C63.872 82.24 71.296 76.224 82.176 76.224C92.416 76.224 99.456 81.6 100.992 90.56L90.752 94.784C89.472 90.688 86.656 86.912 81.536 86.912C77.056 86.912 74.56 89.088 74.56 91.904C74.56 94.592 76.224 96.128 82.56 97.792L88.832 99.456C98.048 101.888 102.272 105.856 102.272 112.512C102.272 122.24 94.336 129.28 82.432 129.28C71.04 129.28 63.232 123.648 61.824 116.352Z" fill="black"/></svg>
        <span class="brand-name">WaveScript 1.0</span>
    </div>
    <button class="btn-export" onclick="exportToHTML()">Export HTML</button>
</div>

<main>
    <div class="pane"><div class="pane-header">Editor</div><textarea id="editor" spellcheck="false" oninput="compile()">
+header/WaveScript/hb:home:"https://wavescr1pt.github.io/"/hb:Docs:#
s/h:72/background:#fff/border-bottom:1px solid #eee/hb:link

+section/WaveScript demopage
s/h:400/background:linear-gradient(135deg,#0081ff,#004)/color:#fff/display:flex/justify-content:center/align-items:center/font-size:3rem/font-weight:900

+section/WaveScriptは、シンプルで読みやすい、webページ制作言語です。\n\nこのページも、たった9行で書かれています。
s/h:300/background:#fff/padding:50px/text-align:center/color:#333
</textarea></div>
    <div class="pane pane-preview"><div class="pane-header">Preview</div><div class="canvas-container"><div id="canvas"></div></div></div>
</main>

<script>
    const editor = document.getElementById('editor');
    const storageKey = 'ws_code_1_0_official';

    window.onload = () => {
        const saved = localStorage.getItem(storageKey);
        if (saved) { editor.value = saved; }
        compile();
    };

    function compile() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        let lastEl = null;
        localStorage.setItem(storageKey, editor.value);

        editor.value.split('\n').forEach(line => {
            const l = line.trim();
            if (!l || l.startsWith('//')) return;
            if (l.startsWith('+')) {
                const parts = l.split(/(?<!:)\//);
                const type = parts[0].slice(1).toLowerCase();
                let el = document.createElement(type === 'header' ? 'div' : 'section');
                if (type === 'header') {
                    el.className = 'ws-h';
                    const left = document.createElement('div'); left.style.fontWeight="700"; left.textContent = parts[1];
                    const right = document.createElement('div'); right.className = 'ws-h-right';
                    for(let i=2; i<parts.length; i++) {
                        if(parts[i].startsWith('hb:')) {
                            const pts = parts[i].split(':');
                            const b = document.createElement('a'); b.className = 'hb'; 
                            b.textContent = pts[1] || ""; 
                            let url = pts.slice(2).join(':').trim().replace(/^"|"$/g, '');
                            b.href = url || "#";
                            if (url.startsWith('http')) { b.target = "_blank"; b.rel = "noopener noreferrer"; }
                            right.appendChild(b);
                        }
                    }
                    el.appendChild(left); el.appendChild(right);
                } else {
                    el.innerText = (parts[1] || "").split('\\n').join('\n');
                }
                canvas.appendChild(el); lastEl = el;
            } else if (l.startsWith('s/') && lastEl) {
                l.slice(2).split(/(?<!:)\//).forEach((seg) => {
                    const pts = seg.split(':');
                    if (pts.length >= 1) {
                        let k = pts[0].trim(), v = pts.length > 1 ? pts.slice(1).join(':').trim() : "";
                        if (k === 'hb' && v === 'link') { lastEl.classList.add('as-link'); return; }
                        if (k === 'h') k = 'height';
                        if (v.match(/^\d+$/)) v += 'px';
                        if (k.startsWith('--')) lastEl.style.setProperty(k, v);
                        else lastEl.style[k] = v;
                    }
                });
            }
        });
    }

    function exportToHTML() {
        const previewHTML = document.getElementById('canvas').innerHTML;
        const styles = document.querySelector('style').innerHTML;
        const faviconLink = document.querySelector('link[rel="icon"]').outerHTML;
        const fullHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>WaveScript Export</title>${faviconLink}<style>${styles}</style></head><body><div id="canvas">${previewHTML}</div></body></html>`;
        const blob = new Blob([fullHTML], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }
</script>
</body>
</html>
