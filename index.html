<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title id="page-title">WaveScript 1.3.3</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Crect width='128' height='128' fill='white'/%3E%3Crect width='128' height='24' fill='%230081FF'/%3E%3Crect y='24' width='128' height='56' fill='%233D3D3D'/%3E%3Cpath d='M12.8 71.68V128H28.416L34.176 100.224L39.808 128H55.424V71.68H43.008V111.872L36.864 82.304H31.36L25.216 111.872V71.68H12.8ZM61.824 116.352L72.448 111.36C73.984 116.096 77.568 118.912 82.816 118.912C88.064 118.912 91.392 116.736 91.392 113.152C91.392 110.08 89.6 108.032 83.328 106.368L77.056 104.704C68.352 102.336 63.872 98.496 63.872 90.944C63.872 82.24 71.296 76.224 82.176 76.224C92.416 76.224 99.456 81.6 100.992 90.56L90.752 94.784C89.472 90.688 86.656 86.912 81.536 86.912C77.056 86.912 74.56 89.088 74.56 91.904C74.56 94.592 76.224 96.128 82.56 97.792L88.832 99.456C98.048 101.888 102.272 105.856 102.272 112.512C102.272 122.24 94.336 129.28 82.432 129.28C71.04 129.28 63.232 123.648 61.824 116.352Z' fill='black'/%3E%3C/svg%3E">
    <style>
        :root { --bg: #0d0d0d; --panel: #141414; --accent: #0081ff; --border: #333; --text-main: #e0e0e0; --text-sub: #666; --editor-text: #b3d9ff; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Nav-bar with Clear Project Name Input */
        .nav-bar { height: 48px; background: var(--panel); display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); z-index: 1000; }
        .brand-section { display: flex; align-items: center; gap: 8px; }
        .ws-logo { height: 22px; width: auto; }
        .brand-label { font-size: 13px; font-weight: 800; color: #fff; margin-right: 4px; }
        
        .project-input { 
            background: #1a1a1a; 
            border: 1px solid var(--border); 
            color: var(--accent); 
            font-size: 12px; 
            font-weight: 600; 
            padding: 4px 10px; 
            border-radius: 4px; 
            width: 180px; 
            transition: 0.2s;
        }
        .project-input:hover { border-color: #555; }
        .project-input:focus { border-color: var(--accent); outline: none; background: #222; box-shadow: 0 0 0 2px rgba(0, 129, 255, 0.2); }
        
        .controls { margin-left: auto; display: flex; gap: 10px; }
        .btn { border: none; padding: 6px 14px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; color: #fff; }
        .btn-save { background: #333; }
        .btn-export { background: var(--accent); }
        
        main { flex: 1; display: flex; overflow: hidden; }
        .pane { flex: 1; display: flex; flex-direction: column; }
        .pane-preview { flex: 1.2; border-left: 1px solid var(--border); }
        .pane-header { font-size: 10px; font-weight: 800; color: var(--text-sub); padding: 10px 20px; text-transform: uppercase; background: var(--panel); border-bottom: 1px solid var(--border); }
        textarea { flex: 1; background: transparent; color: var(--editor-text); border: none; padding: 24px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; outline: none; resize: none; }
        .canvas-container { flex: 1; overflow-y: auto; background: #fff; }
        #canvas { width: 100%; min-height: 100%; color: #000; display: flex; flex-direction: column; }
        
        /* Preview Component Styles */
        .ws-h { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; min-height: 64px; position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .ws-h-right { display: flex; gap: 12px; }
        .hb { text-decoration: none; font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 6px; background: #0081ff; color: #fff; }
        .hb.text-only { background: transparent !important; color: inherit !important; padding: 4px 8px !important; }
        section { box-sizing: border-box; display: flex; flex-direction: column; white-space: pre-line; background-size: cover; background-position: center; background-color: #f5f5f5; }
    </style>
</head>
<body>
<div class="nav-bar">
    <div class="brand-section">
        <svg class="ws-logo" viewBox="0 0 128 128"><rect width="128" height="128" fill="white"/><rect width="128" height="24" fill="#0081FF"/><rect y="24" width="128" height="56" fill="#3D3D3D"/><path d="M12.8 71.68V128H28.416L34.176 100.224L39.808 128H55.424V71.68H43.008V111.872L36.864 82.304H31.36L25.216 111.872V71.68H12.8ZM61.824 116.352L72.448 111.36C73.984 116.096 77.568 118.912 82.816 118.912C88.064 118.912 91.392 116.736 91.392 113.152C91.392 110.08 89.6 108.032 83.328 106.368L77.056 104.704C68.352 102.336 63.872 98.496 63.872 90.944C63.872 82.24 71.296 76.224 82.176 76.224C92.416 76.224 99.456 81.6 100.992 90.56L90.752 94.784C89.472 90.688 86.656 86.912 81.536 86.912C77.056 86.912 74.56 89.088 74.56 91.904C74.56 94.592 76.224 96.128 82.56 97.792L88.832 99.456C98.048 101.888 102.272 105.856 102.272 112.512C102.272 122.24 94.336 129.28 82.432 129.28C71.04 129.28 63.232 123.648 61.824 116.352Z" fill="black"/></svg>
        <span class="brand-label">WaveScript</span>
        <input type="text" id="project-name" class="project-input" value="WaveScript Demo" placeholder="Project Name">
    </div>
    <div class="controls">
        <button class="btn btn-save" onclick="saveToLocal()">Save</button>
        <button class="btn btn-export" onclick="exportToHTML()">Export</button>
    </div>
</div>
<main>
    <div class="pane"><div class="pane-header">Editor</div><textarea id="editor" spellcheck="false">img!1:https://images.unsplash.com/photo-1550684848-fac1c5b4e853
url!1:https://wavescr1pt.github.io/

+header/WaveScript/hb:Home:1/link/hb:About:#/link/hb:GitHub:#/link/h:72/background:#fff/border-bottom:1px solid #eee

+section/WaveScript demopage
s/h:500/bgimg:1/color:#000000/display:flex/align-items:center/justify-content:center/font-size:3rem/font-weight:900

+section/WaveScriptは、シンプル、簡単なwebページ制作用プログラミング言語です。\nこのデモページはWaveScriptを用いて12行で製作されています。
s/h:200/color:#000000/display:flex/align-items:center/justify-content:center/font-size:1rem/font-weight:900</textarea></div>
    <div class="pane pane-preview"><div class="pane-header">Preview</div><div class="canvas-container"><div id="canvas"></div></div></div>
</main>
<script>
    const editor = document.getElementById('editor');
    const canvas = document.getElementById('canvas');
    const projectNameInput = document.getElementById('project-name');

    function applyStyles(el, segs, images) {
        segs.forEach(seg => {
            const cIdx = seg.indexOf(':');
            if (cIdx === -1) return;
            let k = seg.slice(0, cIdx).trim();
            let v = seg.slice(cIdx + 1).trim();
            if (k === 'bgimg') { el.style.backgroundImage = `url("${images[v] || v}")`; }
            else { if (k === 'h') k = 'height'; if (v.match(/^\d+$/)) v += 'px'; el.style[k] = v; }
        });
    }

    function compile() {
        canvas.innerHTML = "";
        let images = {}; let urls = {};
        const lines = editor.value.split('\n');
        lines.forEach(l => {
            const line = l.trim();
            if (line.startsWith('img!')) { const cIdx = line.indexOf(':'); if (cIdx !== -1) images[line.slice(4, cIdx).trim()] = line.slice(cIdx + 1).trim(); }
            else if (line.startsWith('url!')) { const cIdx = line.indexOf(':'); if (cIdx !== -1) urls[line.slice(4, cIdx).trim()] = line.slice(cIdx + 1).trim(); }
        });
        let lastEl = null;
        lines.forEach(l => {
            const line = l.trim();
            if (!line || line.startsWith('//') || line.startsWith('img!') || line.startsWith('url!')) return;
            if (line.startsWith('+')) {
                const firstSlash = line.indexOf('/');
                const type = (firstSlash === -1 ? line.slice(1) : line.slice(1, firstSlash)).trim().toLowerCase();
                const content = firstSlash === -1 ? "" : line.slice(firstSlash + 1);
                let el;
                if (type === 'header') {
                    el = document.createElement('div'); el.className = 'ws-h';
                    const parts = content.split('/');
                    const left = document.createElement('div'); left.style.fontWeight="700"; 
                    left.textContent = (parts[0].trim() === 'WaveScript') ? projectNameInput.value : parts[0];
                    const right = document.createElement('div'); right.className = 'ws-h-right';
                    let remainingParts = [];
                    for(let i=1; i<parts.length; i++) {
                        let p = parts[i].trim();
                        if(p.startsWith('hb:')) {
                            const pts = p.split(':');
                            const b = document.createElement('a'); b.className = 'hb'; 
                            b.textContent = pts[1] || ""; const rawHref = pts.slice(2).join(':') || "#";
                            b.href = urls[rawHref] || rawHref;
                            if (i + 1 < parts.length && parts[i+1].trim() === "link") { b.classList.add('text-only'); i++; }
                            right.appendChild(b);
                        } else { remainingParts.push(p); }
                    }
                    el.appendChild(left); el.appendChild(right);
                    applyStyles(el, remainingParts, images);
                } else {
                    el = document.createElement('section');
                    el.innerText = content.split('\\n').join('\n');
                }
                canvas.appendChild(el); lastEl = el;
            } else if (line.startsWith('s/') && lastEl) { applyStyles(lastEl, line.slice(2).split('/'), images); }
        });
    }

    function saveToLocal() { localStorage.setItem('ws_code_v133', editor.value); localStorage.setItem('ws_name_v133', projectNameInput.value); alert('Saved!'); }

    function exportToHTML() {
        const title = projectNameInput.value || "WaveScript Project";
        const fullHTML = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${title}</title><link rel="icon" href="data:;base64,iVBORw0KGgo="><style>body{margin:0;font-family:sans-serif;}#canvas{display:flex;flex-direction:column;width:100%;}.ws-h{display:flex;align-items:center;justify-content:space-between;padding:0 24px;min-height:64px;position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-bottom:1px solid %23eee;}.ws-h-right{display:flex;gap:12px;}.hb{text-decoration:none;padding:8px 18px;border-radius:6px;background:%230081ff;color:%23fff;font-weight:600;font-size:13px;}.hb.text-only{background:transparent!important;color:inherit!important;padding:4px 8px!important;}section{box-sizing:border-box;display:flex;flex-direction:column;white-space:pre-line;background-size:cover;background-position:center;background-color:%23f5f5f5;}</style></head><body><div id="canvas">${canvas.innerHTML}</div></body></html>`;
        const blob = new Blob([fullHTML], {type:'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = title.toLowerCase().replace(/\s+/g, '_') + '.html'; a.click();
    }

    editor.addEventListener('input', compile);
    projectNameInput.addEventListener('input', () => { 
        document.getElementById('page-title').innerText = projectNameInput.value || "WaveScript";
        compile();
    });

    window.onload = () => {
        const savedCode = localStorage.getItem('ws_code_v133');
        const savedName = localStorage.getItem('ws_name_v133');
        if (savedCode) editor.value = savedCode;
        if (savedName) { projectNameInput.value = savedName; document.getElementById('page-title').innerText = savedName; }
        compile();
    };
</script>
</body>
</html>
